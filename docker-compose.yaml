
services:
  postgres:
    image: postgres:17-alpine
    container_name: fintracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: FinTrackerDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d FinTrackerDb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintracker-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintracker-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: FinTrackerDb
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:5500}
      AllowedOrigins__1: ${FRONTEND_ORIGIN_2:-http://127.0.0.1:5500}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fintracker-net

networks:
  fintracker-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
