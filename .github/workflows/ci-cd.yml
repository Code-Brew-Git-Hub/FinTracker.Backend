
name: FinTracker Backend CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  SOLUTION_FILE: "FinTracker.Backend.slnx" 
  DOTNET_CLI_TELEMETRY_OPTOUT: "true" 
  DOTNET_NOLOGO: "true"                     

jobs:
  lint:
    name: "🔍 Lint & Format Check"
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-lint-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-lint-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLUTION_FILE }}"
        
      - name: Verify code formatting
        run: |
          dotnet format "${{ env.SOLUTION_FILE }}" \
            --verify-no-changes \
            --severity warn \
            --verbosity diagnostic
          
      - name: Build with Roslyn analyzers
        run: |
          dotnet build "${{ env.SOLUTION_FILE }}" \
            --no-restore \
            --configuration Release \
            -p:RunAnalyzers=true \
            -p:EnforceCodeStyleInBuild=true \
            --verbosity minimal

  build-and-test:
    name: "🏗️ Build & Test"
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      checks: write 

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: FinTrackerDb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_secret_pw_42
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d FinTrackerDb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size 128m

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: FinTrackerDb
      DB_USER: postgres
      DB_PASSWORD: ci_secret_pw_42

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-build-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-build-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLUTION_FILE }}"

      - name: Build solution (Release)
        run: |
          dotnet build "${{ env.SOLUTION_FILE }}" \
            --no-restore \
            --configuration Release \
            --verbosity minimal

      - name: Restore .NET local tools (dotnet-ef)
        working-directory: FinTracker.API
        run: dotnet tool restore

      - name: Apply EF Core migrations
        working-directory: FinTracker.API
        run: |
          dotnet ef database update \
            --project ../FinTracker.Data/FinTracker.Data.csproj \
            --startup-project FinTracker.API.csproj \
            --configuration Release \
            --no-build \
            --verbose

      - name: Run tests
        run: |
          dotnet test "${{ env.SOLUTION_FILE }}" \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal" \
            --results-directory "${{ github.workspace }}/TestResults" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Publish test results to GitHub Checks
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Test Results (.NET)"
          path: "${{ github.workspace }}/TestResults/**/*.trx"
          reporter: dotnet-trx
          fail-on-error: false
          fail-on-empty: false

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: "${{ github.workspace }}/TestResults/**/*.xml"
          retention-days: 14

  publish-artifact:
    name: "📦 Publish Release Artifact"
    runs-on: ubuntu-24.04
    needs: [lint, build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-build-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-build-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLUTION_FILE }}"
        
      - name: Publish application
        run: |
          dotnet publish "FinTracker.API/FinTracker.API.csproj" \
            --no-restore \
            --configuration Release \
            --output "${{ github.workspace }}/publish" \
            --verbosity minimal
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: fintracker-backend-${{ github.sha }}
          path: "${{ github.workspace }}/publish/"
          retention-days: 30
          if-no-files-found: error
